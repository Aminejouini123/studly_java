<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>Calendrier des Événements</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom right, rgba(240, 247, 255, 0.9), rgba(251, 253, 255, 0.92));
        }
        #calendar {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(13, 55, 108, 0.08);
        }
        .fc {
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .fc-toolbar-title {
            font-size: 24px !important;
            font-weight: 800 !important;
            color: #0A2E57 !important;
        }
        .fc-button {
            background: linear-gradient(to right, #0A3C77, #0A67C3) !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-weight: 700 !important;
            text-transform: capitalize !important;
        }
        .fc-button:hover {
            opacity: 0.9 !important;
        }
        .fc-button-active {
            background: linear-gradient(to right, #083161, #0856a8) !important;
        }
        .fc-event {
            border-radius: 6px !important;
            border: none !important;
            padding: 4px 8px !important;
            font-size: 13px !important;
            font-weight: 600 !important;
        }
        .fc-daygrid-event {
            margin: 2px 0 !important;
        }
        .fc-event-title {
            font-weight: 600 !important;
        }
        .fc-day-today {
            background-color: rgba(10, 103, 195, 0.08) !important;
        }
        .fc-col-header-cell {
            background: linear-gradient(to right, #0D356C, #0D6BC8);
            color: white !important;
            font-weight: 700 !important;
            padding: 12px 0 !important;
            border: none !important;
        }
        .fc-timegrid-slot {
            height: 3em !important;
        }
        .fc-timegrid-slot-label {
            font-weight: 600 !important;
            color: #475569 !important;
            font-size: 13px !important;
        }
        .fc-timegrid-now-indicator-line {
            border-color: #DC2626 !important;
            border-width: 2px !important;
        }
        .fc-timegrid-now-indicator-arrow {
            border-color: #DC2626 !important;
        }
        .fc-timegrid-event {
            border-radius: 6px !important;
            border-left-width: 4px !important;
        }
        .fc-timegrid-event-harness {
            margin-right: 2px !important;
        }
        .fc-scrollgrid {
            border-radius: 12px !important;
            overflow: hidden !important;
        }
        .fc-theme-standard td, .fc-theme-standard th {
            border-color: #E0E8F1 !important;
        }
        /* Event colors by type */
        .event-etude {
            background: linear-gradient(to right, #0A67C3, #2A8CFF) !important;
        }
        .event-reunion {
            background: linear-gradient(to right, #FF9800, #FFB74D) !important;
        }
        .event-autre {
            background: linear-gradient(to right, #4CAF50, #66BB6A) !important;
        }
    </style>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
</head>
<body>
    <div id='calendar'></div>
    <script>
        let calendar;
        
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay', // Vue jour par défaut avec heures
                initialDate: new Date(), // Toujours commencer à aujourd'hui
                validRange: {
                    start: today // Empêcher la navigation avant aujourd'hui
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridDay,timeGridWeek,dayGridMonth'
                },
                buttonText: {
                    today: "Aujourd'hui",
                    month: 'Mois',
                    week: 'Semaine',
                    day: 'Jour'
                },
                locale: 'fr',
                firstDay: 1,
                height: 'auto',
                slotMinTime: '00:00:00', // Début de la journée
                slotMaxTime: '24:00:00', // Fin de la journée
                slotDuration: '00:30:00', // Intervalles de 30 minutes
                slotLabelInterval: '01:00', // Afficher les labels toutes les heures
                slotLabelFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false // Format 24h
                },
                allDaySlot: true, // Afficher la ligne "all-day"
                allDayText: 'Toute la journée',
                nowIndicator: true, // Ligne rouge pour l'heure actuelle
                scrollTime: '08:00:00', // Scroll automatique à 8h du matin
                eventTimeFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                },
                events: [],
                eventClick: function(info) {
                    // Send event click to Java
                    if (window.javaConnector) {
                        window.javaConnector.onEventClick(info.event.id);
                    }
                },
                eventClassNames: function(arg) {
                    const type = arg.event.extendedProps.type || 'autre';
                    return ['event-' + type.toLowerCase()];
                },
                // Empêcher l'affichage des événements passés
                eventDidMount: function(info) {
                    const eventDate = new Date(info.event.start);
                    if (eventDate < today) {
                        info.el.style.opacity = '0.5';
                        info.el.style.textDecoration = 'line-through';
                    }
                },
                // Désactiver les dates passées visuellement
                dayCellDidMount: function(info) {
                    if (info.date < today) {
                        info.el.style.backgroundColor = '#f5f5f5';
                        info.el.style.color = '#999';
                    }
                },
                // Ordre des événements par heure
                eventOrder: 'start,-duration,allDay,title'
            });
            
            calendar.render();
        });
        
        // Function to load events from Java
        function loadEvents(eventsJson) {
            try {
                const events = JSON.parse(eventsJson);
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            } catch (e) {
                console.error('Error loading events:', e);
            }
        }
        
        // Function to add a single event
        function addEvent(eventJson) {
            try {
                const event = JSON.parse(eventJson);
                calendar.addEvent(event);
            } catch (e) {
                console.error('Error adding event:', e);
            }
        }
        
        // Function to remove an event
        function removeEvent(eventId) {
            const event = calendar.getEventById(eventId);
            if (event) {
                event.remove();
            }
        }
        
        // Function to update an event
        function updateEvent(eventJson) {
            try {
                const eventData = JSON.parse(eventJson);
                const event = calendar.getEventById(eventData.id);
                if (event) {
                    event.setProp('title', eventData.title);
                    event.setStart(eventData.start);
                    event.setEnd(eventData.end);
                    event.setExtendedProp('type', eventData.type);
                }
            } catch (e) {
                console.error('Error updating event:', e);
            }
        }
    </script>
</body>
</html>
